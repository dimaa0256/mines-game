<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game</title>
    <style>
        body { font-family: sans-serif; margin: 20px; background-color: #1a1a1a; color: white; }
        #game-container { display: flex; justify-content: center; gap: 30px; }
        .section { background: #2a2a2a; padding: 20px; border-radius: 8px; }
        .mine-field { display: grid; grid-template-columns: repeat(5, 50px); gap: 5px; }
        .mine-cell { 
            width: 50px; height: 50px; border: 1px solid #444; 
            cursor: pointer; display: flex; justify-content: center; 
            align-items: center; background: #333; 
        }
        .mine-cell.revealed { background: #444; }
        .mine-cell.bomb { background: #800; }
        button { padding: 10px; cursor: pointer; background: #444; color: white; border: 1px solid #666; }
        input { padding: 10px; background: #333; color: white; border: 1px solid #444; }
        .vip-panel { border: 1px solid gold; padding: 15px; margin-top: 10px; color: gold; }
    </style>
</head>
<body>

<div id="game-container">
    <div class="section">
        <h2>Auth</h2>
        <div id="login-form">
            <input type="text" id="username" placeholder="Username">
            <button onclick="checkUser()">Login</button>
        </div>
        <div id="vip-content" style="display:none;" class="vip-panel">
            <strong>ADMIN PANEL ACTIVE</strong>
            <p>User: klimlox</p>
            <button onclick="showMinesCheat()">Show Mines</button>
        </div>
    </div>

    <div class="section">
        <h2>Mines</h2>
        <div id="mine-field" class="mine-field"></div>
        <br>
        <button onclick="startNewGame()">New Game</button>
        <p id="game-status"></p>
    </div>
</div>

<script>
    function checkUser() {
        if (document.getElementById('username').value.toLowerCase() === 'klimlox') {
            document.getElementById('login-form').style.display = 'none';
            document.getElementById('vip-content').style.display = 'block';
        }
    }

    const FIELD_SIZE = 5;
    const MINES_COUNT = 3;
    let mines = [];
    let gameOver = false;

    function startNewGame() {
        const field = document.getElementById('mine-field');
        field.innerHTML = '';
        document.getElementById('game-status').innerText = '';
        mines = [];
        gameOver = false;
        for(let i = 0; i < 25; i++) {
            const cell = document.createElement('div');
            cell.className = 'mine-cell';
            cell.dataset.index = i;
            cell.onclick = (e) => handleCellClick(e.target);
            field.appendChild(cell);
        }
        while(mines.length < MINES_COUNT) {
            let r = Math.floor(Math.random() * 25);
            if(!mines.includes(r)) mines.push(r);
        }
    }

    function handleCellClick(cell) {
        if(gameOver) return;
        const idx = parseInt(cell.dataset.index);
        if(mines.includes(idx)) {
            gameOver = true;
            revealAll();
            document.getElementById('game-status').innerText = 'Game Over';
        } else {
            cell.classList.add('revealed');
            cell.innerText = '💎';
            cell.onclick = null;
        }
    }

    function revealAll() {
        const cells = document.querySelectorAll('.mine-cell');
        mines.forEach(i => {
            cells[i].classList.add('bomb');
            cells[i].innerText = '💣';
        });
    }

    function showMinesCheat() {
        const cells = document.querySelectorAll('.mine-cell');
        mines.forEach(i => cells[i].style.border = '1px solid gold');
    }

    startNewGame();
</script>
</body>
</html>
