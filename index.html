<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Казино с Сапером</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; background-color: #f4f4f4; }
        #game-container { display: flex; justify-content: center; gap: 40px; margin-top: 50px; }
        .section { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .mine-field { display: grid; grid-template-columns: repeat(5, 50px); gap: 5px; margin-bottom: 15px; }
        .mine-cell { 
            width: 50px; height: 50px; border: 1px solid #ccc; 
            cursor: pointer; display: flex; justify-content: center; 
            align-items: center; background: #eee; font-weight: bold;
        }
        .mine-cell.revealed { background: #ddd; cursor: default; }
        .mine-cell.bomb { background: #ff4d4d; }
        button { padding: 10px 20px; cursor: pointer; background: #28a745; color: white; border: none; border-radius: 5px; }
        input { padding: 10px; margin-right: 5px; border: 1px solid #ccc; border-radius: 5px; }
        .vip-badge { color: #d4af37; font-weight: bold; border: 1px solid #d4af37; padding: 10px; margin-top: 10px; }
    </style>
</head>
<body>

<div id="game-container">
    <div id="casino-section" class="section">
        <h2>Казино</h2>
        <div id="login-form">
            <input type="text" id="username" placeholder="Введите никнейм">
            <button onclick="checkUser()">Войти</button>
        </div>
        
        <div class="vip-features" id="vip-content" style="display:none;">
            <div class="vip-badge">💎 ДОСТУП АДМИНА: АКТИВИРОВАН</div>
            <p>Добро пожаловать в панель управления, klimlox!</p>
            <button onclick="location.reload()" style="background:#666">Выйти</button>
        </div>
    </div>

    <div id="mine-section" class="section">
        <h2>Сапер (5x5)</h2>
        <div id="mine-field" class="mine-field"></div>
        <button onclick="startNewGame()">Начать новую игру</button>
        <p id="game-status"></p>
    </div>
</div>

<script>
    // --- VIP СИСТЕМА ---
    function checkUser() {
        const username = document.getElementById('username').value;
        // Тот самый измененный ник
        if (username.toLowerCase() === 'klimlox') {
            alert('Доступ разрешен. Привет, Босс!');
            showVipContent();
        } else {
            alert('Ошибка: Доступ запрещен для этого пользователя.');
        }
    }

    function showVipContent() {
        document.getElementById('login-form').style.display = 'none';
        document.getElementById('vip-content').style.display = 'block';
    }

    // --- ЛОГИКА САПЕРА ---
    const FIELD_SIZE = 5;
    const MINES_COUNT = 3;
    let mines = [];
    let gameOver = false;

    function startNewGame() {
        const field = document.getElementById('mine-field');
        const status = document.getElementById('game-status');
        field.innerHTML = '';
        status.innerText = 'Игра началась!';
        mines = [];
        gameOver = false;
        
        // Создаем клетки
        for(let i = 0; i < FIELD_SIZE * FIELD_SIZE; i++) {
            const cell = document.createElement('div');
            cell.classList.add('mine-cell');
            cell.dataset.index = i;
            cell.addEventListener('click', handleCellClick);
            field.appendChild(cell);
        }
        
        // Расставляем мины
        while(mines.length < MINES_COUNT) {
            let randomIndex = Math.floor(Math.random() * 25);
            if(!mines.includes(randomIndex)) mines.push(randomIndex);
        }
    }

    function handleCellClick(event) {
        if(gameOver) return;
        const cell = event.target;
        const index = parseInt(cell.dataset.index);

        if(mines.includes(index)) {
            // Проигрыш
            gameOver = true;
            revealMines();
            document.getElementById('game-status').innerText = 'БАБАХ! Вы проиграли.';
        } else {
            // Безопасно
            cell.classList.add('revealed');
            cell.innerText = '💎';
            cell.style.cursor = 'default';
        }
    }

    function revealMines() {
        const cells = document.querySelectorAll('.mine-cell');
        mines.forEach(index => {
            cells[index].classList.add('bomb');
            cells[index].innerText = '💣';
        });
    }

    // Запуск при загрузке
    startNewGame();
</script>

</body>
</html>
